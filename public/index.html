<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pick it up — PIU Chart Search</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header>
        <h1>pick it up</h1>
        <p class="subtitle">Pump it Up · Chart Search</p>
      </header>

      <div class="content">
        <!-- ── Filter Panel ───────────────────────────── -->
        <aside class="filter-panel">
          <!-- ── Tabs ──────────────────────────────────── -->
          <div class="panel-tabs">
            <button class="panel-tab active" data-tab="filters">Filters</button>
            <button class="panel-tab" data-tab="overlap">Overlap</button>
            <button class="panel-tab" data-tab="builder">Builder</button>
          </div>

          <!-- ── Filters tab ───────────────────────────── -->
          <div class="tab-panel" id="panel-filters">
          <div class="filter-grid">
            <div class="filter-group full-width">
              <label for="f-title">Song title</label>
              <input
                type="text"
                id="f-title"
                placeholder="e.g. Ignis Fatuus"
                autocomplete="off"
              />
            </div>

            <div class="filter-group full-width">
              <label for="f-artist">Song artist</label>
              <input
                type="text"
                id="f-artist"
                placeholder="e.g. SHK"
                autocomplete="off"
              />
            </div>

            <div class="filter-group full-width">
              <label for="f-step-artist">Step artist</label>
              <input
                type="text"
                id="f-step-artist"
                placeholder="e.g. HANE"
                autocomplete="off"
              />
            </div>

            <div class="filter-group full-width">
              <label>Chart type</label>
              <div class="type-toggle">
                <input
                  type="radio"
                  name="type"
                  id="type-all"
                  value="all"
                  checked
                />
                <label for="type-all">All</label>

                <input type="radio" name="type" id="type-s" value="S" />
                <label for="type-s">Single</label>

                <input type="radio" name="type" id="type-d" value="D" />
                <label for="type-d">Double</label>
              </div>
            </div>

            <div class="filter-group full-width">
              <label>Level range</label>
              <div class="range-row">
                <input
                  type="number"
                  id="f-level-min"
                  min="1"
                  max="29"
                  step="1"
                  placeholder="1"
                />
                <span class="range-sep">to</span>
                <input
                  type="number"
                  id="f-level-max"
                  min="1"
                  max="29"
                  step="1"
                  placeholder="29"
                />
              </div>
            </div>

            <div class="filter-group full-width">
              <label for="f-mode">Mode</label>
              <select id="f-mode">
                <option value="">All modes</option>
                <option value="arcade">Arcade</option>
                <option value="shortcut">Shortcut</option>
                <option value="remix">Remix</option>
                <option value="fullsong">Fullsong</option>
              </select>
            </div>

            <div class="filter-group full-width">
              <label>Version</label>
              <div id="f-version-chips" class="version-chips">
                <!-- populated by JS -->
              </div>
            </div>

            <div class="filter-group full-width">
              <label>BPM range</label>
              <div class="range-row">
                <input type="number" id="f-bpm-min" min="1" step="1" placeholder="min" />
                <span class="range-sep">to</span>
                <input type="number" id="f-bpm-max" min="1" step="1" placeholder="max" />
              </div>
            </div>
          </div>

          <div class="filter-actions">
            <button class="btn-primary" id="btn-search">Search</button>
            <button class="btn-ghost" id="btn-reset">Reset</button>
          </div>
          </div><!-- /panel-filters -->

          <!-- ── Overlap tab ────────────────────────────── -->
          <div class="tab-panel" id="panel-overlap" style="display:none">
            <p class="overlap-desc">Find songs that have charts at <em>both</em> levels simultaneously.</p>

            <div class="filter-grid">
              <div class="filter-group full-width">
                <label>Chart type</label>
                <div class="type-toggle">
                  <input type="radio" name="ov-type" id="ov-type-all" value="all" checked />
                  <label for="ov-type-all">All</label>
                  <input type="radio" name="ov-type" id="ov-type-s" value="S" />
                  <label for="ov-type-s">Single</label>
                  <input type="radio" name="ov-type" id="ov-type-d" value="D" />
                  <label for="ov-type-d">Double</label>
                </div>
              </div>

              <div class="filter-group full-width">
                <label>Both levels present</label>
                <div class="range-row">
                  <input type="number" id="ov-level-a" min="1" max="29" step="1" placeholder="e.g. 18" />
                  <span class="range-sep">&amp;</span>
                  <input type="number" id="ov-level-b" min="1" max="29" step="1" placeholder="e.g. 21" />
                </div>
              </div>
            </div>

            <div class="filter-actions">
              <button class="btn-primary" id="btn-overlap-search">Search</button>
              <button class="btn-ghost" id="btn-overlap-reset">Reset</button>
            </div>
          </div><!-- /panel-overlap -->

          <!-- ── Builder tab ────────────────────────────── -->
          <div class="tab-panel" id="panel-builder" style="display:none">
            <p class="overlap-desc">Configure a CBPIU round to find eligible songs for each division.</p>

            <div class="filter-grid">
              <div class="filter-group full-width">
                <label>Chart type</label>
                <div class="type-toggle">
                  <input type="radio" name="bl-type" id="bl-type-all" value="all" checked />
                  <label for="bl-type-all">All</label>
                  <input type="radio" name="bl-type" id="bl-type-s" value="S" />
                  <label for="bl-type-s">Single</label>
                  <input type="radio" name="bl-type" id="bl-type-d" value="D" />
                  <label for="bl-type-d">Double</label>
                </div>
              </div>
              <div class="filter-group full-width">
                <label for="bl-mode">Mode</label>
                <select id="bl-mode">
                  <option value="arcade">Arcade</option>
                  <option value="">All modes</option>
                  <option value="shortcut">Short Cut</option>
                  <option value="fullsong">Full Song</option>
                  <option value="remix">Remix</option>
                </select>
              </div>
              <div class="filter-group full-width">
                <label>Songs per pool</label>
                <div class="bl-pool-size-row">
                  <button class="btn-ghost btn-sm" id="bl-pool-dec">−</button>
                  <span id="bl-pool-size-display">3</span>
                  <button class="btn-ghost btn-sm" id="bl-pool-inc">+</button>
                </div>
              </div>
              <div class="filter-group full-width">
                <label>Version</label>
                <div id="bl-version-chips" class="version-chips">
                  <!-- populated by JS -->
                </div>
              </div>
              <div class="filter-group full-width">
                <label>BPM range</label>
                <div class="range-row">
                  <input type="number" id="bl-bpm-min" min="1" step="1" placeholder="min" />
                  <span class="range-sep">to</span>
                  <input type="number" id="bl-bpm-max" min="1" step="1" placeholder="max" />
                </div>
              </div>
            </div>

            <div class="bl-section-label">Divisions</div>
            <div id="bl-divisions"><!-- populated by JS --></div>

            <div class="bl-div-controls">
              <button class="btn-ghost btn-sm" id="bl-add-div">+ Div</button>
              <button class="btn-ghost btn-sm" id="bl-remove-div">− Div</button>
            </div>

            <div class="filter-actions">
              <button class="btn-primary" id="btn-build">Build Round</button>
              <button class="btn-ghost" id="btn-build-reset">Reset</button>
            </div>
          </div><!-- /panel-builder -->
        </aside>

        <!-- ── Results Panel ──────────────────────────── -->
        <main class="results-panel">
          <div class="results-header">
            <h2>Results</h2>
            <span class="results-count" id="results-count"></span>
          </div>

          <div class="sort-bar" id="sort-bar" style="display: none">
            <label for="sort-select">Sort by</label>
            <select id="sort-select">
              <option value="title-asc">Title A → Z</option>
              <option value="title-desc">Title Z → A</option>
              <option value="bpm-asc">BPM ↑</option>
              <option value="bpm-desc">BPM ↓</option>
              <option value="charts-desc">Most Charts First</option>
            </select>
          </div>

          <div id="results-body">
            <p class="state-msg">
              Use the filters on the left and press <strong>Search</strong>.
            </p>
          </div>
        </main>
      </div>

      <footer>
        <p>
          Feito com ❤️ por
          <a href="https://github.com/eparraga95">eparraga95</a>
        </p>
        <p class="footer-note" id="db-meta"></p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
